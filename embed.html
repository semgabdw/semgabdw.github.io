<!DOCTYPE html>
<html>
	<head>
		<title>WDB Games</title>
		<style>
			html, body {
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				background: black;
			}
			iframe {
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				border: none;
				display: block;
			}
			#viewer {
				position: fixed;
				inset: 0;
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				z-index: 1000;
				flex-direction: column;
			}
			#frame {
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				border: none;
				display: block;
			}
		</style>
	</head>
	
	<body>
		<iframe id="frame"></iframe>
		<script src="main.js"></script>
		<script>
			const g_frame = document.getElementById("frame");
			const g_params = new URLSearchParams(window.location.search);

			const g_typeParam = g_params.get("t");
			const g_idParam = g_params.get("id");

			if (g_typeParam === null && g_idParam === null) {
				throw new Error("no type and id parameters");
			}

			if (g_typeParam === null) {
				throw new Error("no type parameter");
			}

			if (g_idParam === null) {
				throw new Error("no id parameter");
			}

			const g_type = Number(g_typeParam);
			const g_id = Number(g_idParam);

			function load() {
				switch (g_type) {
					case 0:
						loadCustom();
						break;
					case 1:
						loadWDBG();
						break;
					case 2:
						loadGN();
						break;
				}
			}

			async function loadCustom() {
				const response = await fetch(localStorage.getItem("customJsonUrl") || "custom.json");
				const data = await response.json();

				const game = data.find((game) => game.id == g_id);
				g_frame.src = game.link;
			}

			async function loadWDBG() {
				const user = "wowdabug";
				
				const baseUrl = "https://cdn.jsdelivr.net/gh/" + user + "/server@main/";

				let type = 0;
				if (typeof document.write !== "function") {
					console.warn("document.write not supported");
					type = 1;
				}

				const gameViewer = document.createElement("div");
				gameViewer.id = "viewer";
				document.body.appendChild(gameViewer);
				
				const responseA = await fetch(baseUrl + "games.json");
				const data = await responseA.json();

				const game = data.find((game) => game.id == g_id);
				const url = baseUrl + game.id + "/index.html";
				
				const responseB = await fetch(url + "?t=" + Date.now());
				const html = await responseB.text();

				const fixedHtml = html.replace("<head>", "<head>" + "<base href=\"" + url + "\">");
				g_frame.sandbox = "allow-scripts allow-same-origin allow-forms allow-pointer-lock";
				
				gameViewer.appendChild(g_frame);
				switch (type) {
					case 0:
						g_frame.contentDocument.open();
						g_frame.contentDocument.write(fixedHtml);
						g_frame.contentDocument.close();
						break;
					case 1:
						g_frame.srcdoc = fixedHtml;
						break;
					case 2:
						const blob = new Blob([fixedHtml], { 
							type: "text/html" 
						});
						g_frame.src = URL.createObjectURL(blob);
						break;
				}

				g_frame.style.display = "block";
			}

			async function loadGN() {
				const user = "freebuisness";

				const zonesURL = "https://cdn.jsdelivr.net/gh/" + user + "/assets/zones.json";
				const coverURL = "https://cdn.jsdelivr.net/gh/" + user + "/covers@main";
				const htmlURL = "https://cdn.jsdelivr.net/gh/" + user + "/html@main";

				let zoneViewer = document.createElement("div");
				zoneViewer.id = "viewer";
				document.body.appendChild(zoneViewer);

				const response = await fetch(zonesURL + "?t=" + Date.now());
				const data = await response.json();
				const zone = data.find((zone) => zone.id == g_id);
				if (zone.url.startsWith("http")) {
					window.open(zone.url, "_blank");
				} else {
					const url = zone.url
						.replace("{COVER_URL}", coverURL)
						.replace("{HTML_URL}", htmlURL);
					fetch(url + "?t=" + Date.now())
						.then((response) => response.text())
						.then((html) => {
							g_frame.sandbox = "allow-scripts allow-same-origin allow-forms allow-pointer-lock";
							zoneViewer.appendChild(g_frame);
							g_frame.contentDocument.open();
							g_frame.contentDocument.write(html);
							g_frame.contentDocument.close();
							g_frame.style.display = "block";
						})
						.catch((error) => {
							console.error(error);
							alert(error);
						});
				}
			}

			load();
		</script>
	</body>
</html>
