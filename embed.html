<!DOCTYPE html>
<html>
	<head>
		<title>WDB Games</title>
		<style>
			html, body {
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				background: black;
			}
			iframe {
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				border: none;
				display: block;
			}
			#viewer {
				position: fixed;
				inset: 0;
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				z-index: 1000;
				flex-direction: column;
			}
			#frame {
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				border: none;
				display: block;
			}
		</style>
	</head>
	
	<body>
		<iframe id="frame"></iframe>
		<script src="main.js"></script>
		<script>
			g_frame = document.getElementById("frame");
			g_params = new URLSearchParams(window.location.search);
			g_type = Number(g_params.get("t"));
			g_id = Number(g_params.get("id"));

			function load() {
				switch (g_type) {
					case 0:
						loadCustom();
						break;
					case 1:
						loadWDBG();
						break;
					case 2:
						loadGN();
						break;
					case 3:
						loadCMG();
						break;
				}
			}

			async function loadCustom() {
				const response = await fetch(localStorage.getItem("customJsonUrl") || "custom.json");
				const data = await response.json();

				const game = data.find((game) => game.id == g_id);
				g_frame.src = game.link;
			}

			async function loadWDBG() {
				let gameViewer = document.createElement("div");
				gameViewer.id = "viewer";
				document.body.appendChild(gameViewer);

				const response = await fetch("https://cdn.jsdelivr.net/gh/wowdabug/server@main/wdbg.json");
				const data = await response.json();

				const game = data.find((game) => game.id == g_id);
				const url = "https://cdn.jsdelivr.net/gh/wowdabug/server@main/" + "2048/index.html";
				
				fetch(url + "?t=" + Date.now())
					.then((response) => response.text())
					.then((html) => {
						html = html.replace("<head>", "<head>" + "<base href=\"" + url + "\">");
						g_frame.sandbox = "allow-scripts allow-same-origin allow-forms allow-pointer-lock";
						
						gameViewer.appendChild(g_frame);
						g_frame.contentDocument.open();
						g_frame.contentDocument.write(html);
						g_frame.contentDocument.close();
						g_frame.style.display = "block";
						try {
							const url = new URL(window.location);
							url.searchParams.set("id", game.id);
							history.pushState(null, "", url.toString());
						} catch (error) {
							console.error(error);
						}
					})
					.catch((error) => {
						console.error(error);
						alert(error);
					});
			}

			async function loadGN() {
				const zonesURL = "https://cdn.jsdelivr.net/gh/gn-math/assets/zones.json";
				const coverURL =
					"https://cdn.jsdelivr.net/gh/%67%6e%2d%6d%61%74%68/covers@main";
				const htmlURL = "https://cdn.jsdelivr.net/gh/%67%6e%2d%6d%61%74%68/html@main";

				let zoneViewer = document.createElement("div");
				zoneViewer.id = "viewer";
				document.body.appendChild(zoneViewer);

				const response = await fetch(zonesURL + "?t=" + Date.now());
				const data = await response.json();
				const zone = data.find((zone) => zone.id == g_id);
				if (zone.url.startsWith("http")) {
					window.open(zone.url, "_blank");
				} else {
					const url = zone.url
						.replace("{COVER_URL}", coverURL)
						.replace("{HTML_URL}", htmlURL);
					fetch(url + "?t=" + Date.now())
						.then((response) => response.text())
						.then((html) => {
							g_frame.sandbox = "allow-scripts allow-same-origin allow-forms allow-pointer-lock";
							zoneViewer.appendChild(g_frame);
							g_frame.contentDocument.open();
							g_frame.contentDocument.write(html);
							g_frame.contentDocument.close();
							g_frame.style.display = "block";
							try {
								const url = new URL(window.location);
								url.searchParams.set("id", zone.id);
								history.pushState(null, "", url.toString());
							} catch (error) {
								console.error(error);
							}
						})
						.catch((error) => {
							console.error(error);
							alert(error);
						});
				}
			}

			async function loadCMG() {
				const response = await fetch("temp/cmatgame_games_with_levels.json");
				const data = await response.json();
				const game = data.game.find((game) => game.id == g_id);

				try {
					const url = "https://www.coolmathgames.com/0-" + game.alias + "/play";
					if (url == null) {
						throw new Error();
					}

					const urlResponse = await fetch(url);
					if (!urlResponse.ok) {
						throw new Error();
					}

					const html = await urlResponse.text();
					const parser = new DOMParser();
					const doc = parser.parseFromString(html, "text/html");
					const base = doc.querySelector("base");
					if (!base) {
						throw new Error();
					}

					const baseHref = base.getAttribute("href");
					const path = baseHref.startsWith("http") ? baseHref : "https:" + baseHref;
					g_frame.src = path + "index.html";
				} catch (error) {
					console.warn(error);
					g_frame.src = "https://" + game.alias + ".coolmathgames.com";
				}
			}

			load();
		</script>
	</body>
</html>
