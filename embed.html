<!DOCTYPE html>
<html>
	<head>
		<title>WDB Games</title>
		<style>
			html, body {
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				background: black;
			}
			iframe {
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				border: none;
				display: block;
			}
			#viewer {
				position: fixed;
				inset: 0;
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				z-index: 1000;
				flex-direction: column;
			}
			#frame {
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				border: none;
				display: block;
			}
		</style>
	</head>
	
	<body>
		<iframe id="frame"></iframe>
		<script src="main.js"></script>
		<script>
			g_frame = document.getElementById("frame");
			g_params = new URLSearchParams(window.location.search);
			g_type = Number(g_params.get("t"));
			g_id = Number(g_params.get("id"));

			function load() {
				switch (g_type) {
					case 0:
						loadCustom();
						break;
					case 1:
						loadWDBG();
						break;
					case 2:
						loadGN();
						break;
					case 3:
						loadCMG();
						break;
				}
			}

			async function loadCustom() {
				const response = await fetch(localStorage.getItem("customJsonUrl") || "custom.json");
				const data = await response.json();

				const game = data.find((game) => game.id == g_id);
				g_frame.src = game.link;
			}

			async function loadWDBG() {
				let type = 0;
				if (typeof document.write !== "function") {
					console.warn("document.write not supported");
					type = 1;
				}

				const gameViewer = document.createElement("div");
				gameViewer.id = "viewer";
				document.body.appendChild(gameViewer);

				const responseA = await fetch("https://cdn.jsdelivr.net/gh/wowdabug/server@main/wdbg.json");
				const data = await responseA.json();

				const game = data.find((game) => game.id == g_id);
				const url = "https://cdn.jsdelivr.net/gh/wowdabug/server@main/" + game.id + "/index.html";
				
				const responseB = await fetch(url + "?t=" + Date.now());
				const html = await responseB.text();
				
				const fixedHtml = html.replace("<head>", "<head>" + "<base href=\"" + url + "\">");
				g_frame.sandbox = "allow-scripts allow-same-origin allow-forms allow-pointer-lock";
				
				gameViewer.appendChild(g_frame);
				switch (type) {
					case 0:
						g_frame.contentDocument.open();
						g_frame.contentDocument.write(fixedHtml);
						g_frame.contentDocument.close();
						break;
					case 1:
						g_frame.srcdoc = fixedHtml;
						break;
					case 2:
						const blob = new Blob([fixedHtml], { 
							type: "text/html" 
						});
						g_frame.src = URL.createObjectURL(blob);
						break;
				}

				g_frame.style.display = "block";
			}

			async function loadGN() {
				const user = "freebuisness";

				const zonesURL = "https://cdn.jsdelivr.net/gh/" + user + "/assets/zones.json";
				const coverURL = "https://cdn.jsdelivr.net/gh/" + user + "/covers@main";
				const htmlURL = "https://cdn.jsdelivr.net/gh/" + user + "/html@main";

				let zoneViewer = document.createElement("div");
				zoneViewer.id = "viewer";
				document.body.appendChild(zoneViewer);

				const response = await fetch(zonesURL + "?t=" + Date.now());
				const data = await response.json();
				const zone = data.find((zone) => zone.id == g_id);
				if (zone.url.startsWith("http")) {
					window.open(zone.url, "_blank");
				} else {
					const url = zone.url
						.replace("{COVER_URL}", coverURL)
						.replace("{HTML_URL}", htmlURL);
					fetch(url + "?t=" + Date.now())
						.then((response) => response.text())
						.then((html) => {
							g_frame.sandbox = "allow-scripts allow-same-origin allow-forms allow-pointer-lock";
							zoneViewer.appendChild(g_frame);
							g_frame.contentDocument.open();
							g_frame.contentDocument.write(html);
							g_frame.contentDocument.close();
							g_frame.style.display = "block";
						})
						.catch((error) => {
							console.error(error);
							alert(error);
						});
				}
			}

			async function loadCMG() {
				const response = await fetch("temp/cmatgame_games_with_levels.json");
				const data = await response.json();
				const game = data.game.find((game) => game.id == g_id);

				try {
					const url = "https://www.coolmathgames.com/0-" + game.alias + "/play";
					if (url == null) {
						throw new Error();
					}

					const urlResponse = await fetch(url);
					if (!urlResponse.ok) {
						throw new Error();
					}

					const html = await urlResponse.text();
					const parser = new DOMParser();
					const doc = parser.parseFromString(html, "text/html");
					const base = doc.querySelector("base");
					if (!base) {
						throw new Error();
					}

					const baseHref = base.getAttribute("href");
					const path = baseHref.startsWith("http") ? baseHref : "https:" + baseHref;
					g_frame.src = path + "index.html";
				} catch (error) {
					console.warn(error);
					g_frame.src = "https://" + game.alias + ".coolmathgames.com";
				}
			}

			load();
		</script>
	</body>
</html>
